<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Turismo Colombia</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Descubre Colombia</h1>
        <p>Un paraíso lleno de cultura, naturaleza y aventura</p>
    </header>

    <section class="destinos">
        <div class="card">
            <h2>Cartagena</h2>
            <p>Ciudad histórica con playas hermosas y arquitectura colonial.</p>
            <button onclick="mostrarMensaje('Cartagena')">Ver más</button>
        </div>

        <div class="card">
            <h2>Medellín</h2>
            <p>La ciudad de la eterna primavera y la innovación.</p>
            <button onclick="mostrarMensaje('Medellín')">Ver más</button>
        </div>

        <div class="card">
            <h2>San Andrés</h2>
            <p>El mar de los 7 colores y playas paradisíacas.</p>
            <button onclick="mostrarMensaje('San Andrés')">Ver más</button>
        </div>
    </section>

    <footer>
        <p>© 2026 Turismo Colombia</p>
    </footer>

    <script src="script.js"></script>

</html>
